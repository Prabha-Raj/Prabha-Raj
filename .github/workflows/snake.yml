name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"  # Runs every 12 hours
  workflow_dispatch:        # Allows manual triggering

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    timeout-minutes: 10     # Prevents long-running jobs
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Updated to latest version
        
      - name: Generate Snake SVG
        uses: Platane/snk@v3      # Updated to stable v3
        id: snake-generator
        with:
          github_user_name: Prabha-Raj
          svg_out_path: dist/github-contribution-grid-snake.svg
          svg_out_path_dark: dist/github-contribution-grid-snake-dark.svg
          
      - name: Commit and push output
        uses: EndBug/add-and-commit@v9
        with:
          branch: output
          add: 'dist/*.svg'
          message: 'Update snake animation'
          author_name: Prabhakar Rajput
          author_email: prabhakarrajput78824@gmail.com